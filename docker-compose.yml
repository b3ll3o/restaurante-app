version: '3.9'

services:
  # Next.js dev server that E2E tests depend on
  app:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    working_dir: /app
    command: npm run dev
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - DATABASE_URL=${DATABASE_URL:-}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3000']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - menulink-network

  # E2E test runner
  e2e:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    working_dir: /app
    command: npx playwright test
    volumes:
      - .:/app
      - /app/node_modules
      - playwright-report:/app/playwright-report
      - test-results:/app/test-results
    depends_on:
      app:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - DATABASE_URL=${DATABASE_URL:-}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    networks:
      - menulink-network

networks:
  menulink-network:
    driver: bridge

volumes:
  playwright-report:
  test-results: